<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" width="400" height="240">
  <!-- Background -->
  <rect width="400" height="240" fill="#0d2b2b"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="60" x2="400" y2="60" stroke="#1a4040" stroke-width="1"/>
  <line x1="0" y1="120" x2="400" y2="120" stroke="#1a4040" stroke-width="1"/>
  <line x1="0" y1="180" x2="400" y2="180" stroke="#1a4040" stroke-width="1"/>
  <line x1="100" y1="0" x2="100" y2="240" stroke="#1a4040" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="240" stroke="#1a4040" stroke-width="1"/>
  <line x1="300" y1="0" x2="300" y2="240" stroke="#1a4040" stroke-width="1"/>

  <!-- Top bar -->
  <rect width="400" height="36" fill="#0a2020"/>
  <circle cx="18" cy="18" r="5" fill="#2dd4bf" opacity="0.8"/>
  <rect x="30" y="12" width="60" height="12" rx="3" fill="#1a4040"/>
  <rect x="100" y="12" width="40" height="12" rx="3" fill="#1a4040"/>
  <rect x="150" y="12" width="40" height="12" rx="3" fill="#1a4040"/>
  <rect x="340" y="10" width="50" height="16" rx="4" fill="#0d9488"/>
  <text x="365" y="22" font-family="monospace" font-size="8" fill="white" text-anchor="middle">+ New</text>

  <!-- Stat cards row -->
  <!-- Card 1: Revenue -->
  <rect x="12" y="48" width="85" height="56" rx="6" fill="#0f3333" stroke="#1d5c5c" stroke-width="1"/>
  <text x="20" y="63" font-family="monospace" font-size="7" fill="#5eead4">REVENUE</text>
  <text x="20" y="80" font-family="monospace" font-size="13" font-weight="bold" fill="#ccfbf1">ETB 84K</text>
  <text x="20" y="94" font-family="monospace" font-size="7" fill="#2dd4bf">▲ 12.4%</text>

  <!-- Card 2: Expenses -->
  <rect x="105" y="48" width="85" height="56" rx="6" fill="#0f3333" stroke="#1d5c5c" stroke-width="1"/>
  <text x="113" y="63" font-family="monospace" font-size="7" fill="#5eead4">EXPENSES</text>
  <text x="113" y="80" font-family="monospace" font-size="13" font-weight="bold" fill="#ccfbf1">ETB 31K</text>
  <text x="113" y="94" font-family="monospace" font-size="7" fill="#f87171">▼ 3.1%</text>

  <!-- Card 3: Tax Due -->
  <rect x="198" y="48" width="85" height="56" rx="6" fill="#0f3333" stroke="#1d5c5c" stroke-width="1"/>
  <text x="206" y="63" font-family="monospace" font-size="7" fill="#5eead4">TAX DUE</text>
  <text x="206" y="80" font-family="monospace" font-size="13" font-weight="bold" fill="#ccfbf1">ETB 9.2K</text>
  <text x="206" y="94" font-family="monospace" font-size="7" fill="#fbbf24">● Pending</text>

  <!-- Card 4: Net Profit -->
  <rect x="291" y="48" width="97" height="56" rx="6" fill="#0f3333" stroke="#1d5c5c" stroke-width="1"/>
  <text x="299" y="63" font-family="monospace" font-size="7" fill="#5eead4">NET PROFIT</text>
  <text x="299" y="80" font-family="monospace" font-size="13" font-weight="bold" fill="#ccfbf1">ETB 43K</text>
  <text x="299" y="94" font-family="monospace" font-size="7" fill="#2dd4bf">▲ 8.7%</text>

  <!-- Chart area -->
  <rect x="12" y="114" width="230" height="100" rx="6" fill="#0f3333" stroke="#1d5c5c" stroke-width="1"/>
  <text x="22" y="129" font-family="monospace" font-size="8" fill="#5eead4">MONTHLY LEDGER</text>

  <!-- Bar chart bars -->
  <rect x="28"  y="170" width="16" height="30" rx="2" fill="#0d9488" opacity="0.7"/>
  <rect x="52"  y="158" width="16" height="42" rx="2" fill="#0d9488" opacity="0.8"/>
  <rect x="76"  y="163" width="16" height="37" rx="2" fill="#0d9488" opacity="0.7"/>
  <rect x="100" y="148" width="16" height="52" rx="2" fill="#14b8a6"/>
  <rect x="124" y="155" width="16" height="45" rx="2" fill="#0d9488" opacity="0.8"/>
  <rect x="148" y="143" width="16" height="57" rx="2" fill="#2dd4bf"/>
  <rect x="172" y="150" width="16" height="50" rx="2" fill="#0d9488" opacity="0.8"/>
  <rect x="196" y="138" width="16" height="62" rx="2" fill="#2dd4bf"/>

  <!-- Trend line overlay -->
  <polyline points="36,172 60,160 84,165 108,150 132,157 156,145 180,152 204,140"
    fill="none" stroke="#5eead4" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.6"/>

  <!-- X axis labels -->
  <text x="30"  y="212" font-family="monospace" font-size="6" fill="#4d7c7c">Jan</text>
  <text x="54"  y="212" font-family="monospace" font-size="6" fill="#4d7c7c">Feb</text>
  <text x="78"  y="212" font-family="monospace" font-size="6" fill="#4d7c7c">Mar</text>
  <text x="102" y="212" font-family="monospace" font-size="6" fill="#4d7c7c">Apr</text>
  <text x="126" y="212" font-family="monospace" font-size="6" fill="#4d7c7c">May</text>
  <text x="150" y="212" font-family="monospace" font-size="6" fill="#4d7c7c">Jun</text>
  <text x="174" y="212" font-family="monospace" font-size="6" fill="#4d7c7c">Jul</text>
  <text x="198" y="212" font-family="monospace" font-size="6" fill="#4d7c7c">Aug</text>

  <!-- Transactions panel -->
  <rect x="252" y="114" width="136" height="100" rx="6" fill="#0f3333" stroke="#1d5c5c" stroke-width="1"/>
  <text x="262" y="129" font-family="monospace" font-size="8" fill="#5eead4">TRANSACTIONS</text>

  <!-- Transaction rows -->
  <rect x="262" y="135" width="8" height="8" rx="2" fill="#2dd4bf"/>
  <rect x="276" y="136" width="50" height="5" rx="1" fill="#1d5c5c"/>
  <rect x="276" y="143" width="30" height="4" rx="1" fill="#164444"/>
  <text x="348" y="143" font-family="monospace" font-size="7" fill="#2dd4bf" text-anchor="end">+2,400</text>

  <rect x="262" y="153" width="8" height="8" rx="2" fill="#f87171"/>
  <rect x="276" y="154" width="45" height="5" rx="1" fill="#1d5c5c"/>
  <rect x="276" y="161" width="35" height="4" rx="1" fill="#164444"/>
  <text x="348" y="161" font-family="monospace" font-size="7" fill="#f87171" text-anchor="end">-1,150</text>

  <rect x="262" y="171" width="8" height="8" rx="2" fill="#2dd4bf"/>
  <rect x="276" y="172" width="55" height="5" rx="1" fill="#1d5c5c"/>
  <rect x="276" y="179" width="25" height="4" rx="1" fill="#164444"/>
  <text x="348" y="179" font-family="monospace" font-size="7" fill="#2dd4bf" text-anchor="end">+5,800</text>

  <rect x="262" y="189" width="8" height="8" rx="2" fill="#fbbf24"/>
  <rect x="276" y="190" width="40" height="5" rx="1" fill="#1d5c5c"/>
  <rect x="276" y="197" width="32" height="4" rx="1" fill="#164444"/>
  <text x="348" y="197" font-family="monospace" font-size="7" fill="#fbbf24" text-anchor="end">-920</text>

  <!-- Branding watermark -->
  <text x="200" y="232" font-family="monospace" font-size="9" fill="#1d5c5c" text-anchor="middle" letter-spacing="3">ETHIO HISAB · ACCOUNTING SAAS</text>
</svg>
